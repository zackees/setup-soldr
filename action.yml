name: setup-soldr
author: zackees
description: Extraction-ready Soldr setup action. Installs one soldr binary, bootstraps rustup when needed, provisions the resolved Rust toolchain, and restores a cacheable runner-local Soldr root.
branding:
  icon: terminal
  color: green
inputs:
  version:
    description: Soldr version or tag to install. Defaults to 0.7.16.
    required: false
    default: "0.7.16"
  repo:
    description: Internal override for the Soldr source repository used by integration branches.
    required: false
    default: zackees/soldr
  ref:
    description: Internal override that builds Soldr from a Git ref instead of downloading a release asset.
    required: false
    default: ""
  cache:
    description: Restore and save the action-managed cache/state root across workflow runs.
    required: false
    default: "true"
  cache-dir:
    description: Override the runner-local cache/state root used for the installed soldr binary and any managed rustup state rehydrated by this action.
    required: false
    default: ""
  cache-key-suffix:
    description: Optional extra suffix appended to the cache key.
    required: false
    default: ""
  toolchain:
    description: Override the exact Rust toolchain channel string. When empty, toolchain-file is used if present, otherwise stable.
    required: false
    default: ""
  toolchain-file:
    description: Toolchain file to read when toolchain is not explicitly set.
    required: false
    default: rust-toolchain.toml
  trust-mode:
    description: Optional value for SOLDR_TRUST_MODE.
    required: false
    default: ""
  timestamps:
    description: Prefix setup-soldr diagnostic and streamed command output with elapsed mm:ss timestamps.
    required: false
    default: "true"
  lockfile:
    description: Optional Cargo.lock path used for Rust artifact cache keying. Empty infers Cargo.lock next to target-dir, then workspace Cargo.lock.
    required: false
    default: ""
  build-cache:
    description: >
      Restore and save Soldr/zccache build cache state across workflow runs.
      Default "true"; set to "false" to opt out of zccache artifact caching.
    required: false
    default: "true"
  build-cache-mode:
    description: >
      Rust build cache mode. "once" is the default full-snapshot-on-miss mode
      that restores only the local rust-plan bundle on later hits without
      resaving the full target tree. "thin" is the bounded dependency-artifact
      alternative. "full" opts into normal whole-target restore/save behavior
      and should be treated as unbounded.
    required: false
    default: ""
  target-cache:
    description: >
      Deprecated compatibility input. Set to "false" to disable Rust target
      artifact caching; prefer build-cache-mode for selecting once, thin, or full.
    required: false
    default: "true"
  target-cache-mode:
    description: >
      Deprecated compatibility input translated into build-cache-mode.
      "hot" maps to "thin", "full" maps to "full", and "off" disables Rust
      target artifact caching.
    required: false
    default: ""
  target-dir:
    description: Cargo target directory used by soldr when constructing the Rust artifact cache plan.
    required: false
    default: target
  target-cache-profile:
    description: >
      Thin-slice pruning policy for the target/ cache. Values:
        - thin-v1 (default): legacy slice, keeps .rlib/.rmeta/proc-macro outputs
        - thin-v2: aggressive prune (fingerprints + dep-info + final outputs only),
                   relies on zccache compilation cache to repopulate library bytes
      Stay on thin-v1. soldr#237 shipped in soldr 0.7.15 so the CLI now emits
      the thin-v2 manifest, but zccache has not yet been updated to honor the
      new manifest.v2 wire format and silently downgrades to thin-v1 with a
      one-line soldr warning. Opt into thin-v2 only after a zccache release
      lands with manifest.v2 support and the thin-v2-verify gate has been
      green on soldr main for at least one week.
    required: false
    default: thin-v1
  target-cache-strip-debuginfo:
    description: >
      When "true", requests that soldr strip debug-info-bearing artifacts from
      the target-cache before saving. Forward-compatible: requires soldr#237 to
      take effect; current soldr releases ignore the flag. Default "" (unset -
      soldr default applies).
    required: false
    default: ""
  target-cache-include-incremental:
    description: >
      When "false", requests that soldr exclude target/*/incremental/
      directories from the target-cache. Forward-compatible: requires
      soldr#237 to take effect. Default "" (unset - soldr default applies).
    required: false
    default: ""
  target-cache-include-build-script-binaries:
    description: >
      When "false", requests that soldr exclude
      target/*/build/*-{hash}/build-script-build binaries from the
      target-cache. Forward-compatible: requires soldr#237 to take effect.
      Default "" (unset - soldr default applies).
    required: false
    default: ""
  target-cache-compress:
    description: >
      Compression codec used when packing the target-cache tar archive.
      Values: "auto" (let soldr decide), "zstd" (force zstd), or "none"
      (uncompressed). Default "zstd". Forward-compatible: requires a soldr
      release that consumes SOLDR_TARGET_CACHE_COMPRESS; older soldr
      releases ignore the setting and fall back to their built-in behavior.
    required: false
    default: "zstd"
  target-cache-compress-level:
    description: >
      Compression level used when target-cache-compress is "zstd" (or "auto"
      and soldr selects zstd). Accepts integers 1-22; zstd's default is 3.
      Forward-compatible: requires a soldr release that consumes
      SOLDR_TARGET_CACHE_COMPRESS_LEVEL.
    required: false
    default: "3"
  source-mtime-normalize:
    description: >
      Opt-in. When "true", rewrite the mtime of tracked Rust build-input files
      under the GitHub Actions workspace to each file's last-commit timestamp
      before the target-cache restore runs. This keeps Cargo fingerprints
      stable across fresh checkouts of the same SHA so restored target caches
      can be reused as a no-op. Files with no git history are left alone, so
      real source edits still invalidate fingerprints. Defaults to "false".
    required: false
    default: "false"
  cargo-registry-cache:
    description: >
      Opt-in. When "true", setup-soldr manages a separate actions/cache step
      for ~/.cargo/registry that pre-compresses the directory into a single
      .tar.zst via the embedded setup-soldr-cache-compress sub-action. Also
      exports SOLDR_SKIP_CARGO_REGISTRY_SAVE=1 so the zccache CLI's built-in
      cargo-registry save no-ops and the payload is not double-saved.
      Default "false" until the zccache release that honors the skip flag
      lands; flip to "true" in a follow-up once it does.
    required: false
    default: "false"
outputs:
  soldr-path:
    description: Installed Soldr binary path added to PATH for later steps.
  soldr-version:
    description: Installed Soldr version reported by soldr version --json.
  cache-dir:
    description: Runner-local cache/state root used by the action.
  setup-duration-seconds:
    description: Total wall-clock time spent inside the setup-soldr action.
  setup-phase-summary:
    description: JSON timing summary for the main setup phases and cache restore statuses.
  cache-hit:
    description: Whether the action restored an exact cache hit for the selected cache/state root.
  cache-key:
    description: Primary key used for the action-managed cache/state root.
  cache-restore-status:
    description: Diagnostic restore status for the action-managed cache/state root.
  build-cache-hit:
    description: >
      Whether the action restored the Soldr-owned zccache compilation
      artifact cache. "true" for an exact key match, "false" for a
      restore-key fallback or no cache, empty string when `build-cache`
      is explicitly disabled.
  build-cache-key:
    description: Primary key used for the Soldr-owned zccache compilation cache.
  build-cache-path:
    description: Soldr-owned zccache compilation cache path.
  build-cache-mode:
    description: Effective setup-soldr Rust build cache mode.
  build-cache-restore-status:
    description: Diagnostic restore status for the Soldr-owned zccache compilation cache.
  target-cache-hit:
    description: >
      Whether the action restored the zccache-owned Rust artifact cache state. "true"
      for an exact key match, "false" for a restore-key fallback or no cache,
      empty string when `target-cache` or `build-cache` is disabled.
  target-cache-key:
    description: Primary key used for the zccache-owned Rust artifact cache state.
  target-cache-path:
    description: Cargo target directory used by soldr for Rust artifact planning.
  target-cache-paths:
    description: Path or newline-delimited path list passed to actions/cache for zccache-owned Rust artifact cache state.
  target-cache-mode:
    description: Effective setup-soldr Rust target artifact cache mode.
  target-cache-profile:
    description: Effective setup-soldr thin-slice pruning policy (thin-v1 or thin-v2).
  target-cache-compress:
    description: Effective target-cache compression codec (auto, zstd, or none).
  target-cache-compress-level:
    description: Effective target-cache compression level (1-22) applied when zstd is selected.
  target-cache-restore-status:
    description: Diagnostic restore status for the Rust target artifact cache state.
  target-cache-budget-bytes:
    description: Soft byte budget used to warn when the restored Rust artifact cache footprint is likely too large for fast CI reuse.
  target-cache-budget-files:
    description: Soft file-count budget used to warn when the restored Rust artifact cache footprint is likely too large for fast CI reuse.
  target-cache-footprint-bytes:
    description: Observed byte size of the restored Rust artifact cache footprint across the cache paths selected for the current mode.
  target-cache-footprint-files:
    description: Observed file count of the restored Rust artifact cache footprint across the cache paths selected for the current mode.
  target-cache-budget-status:
    description: Soft-budget diagnostic for the restored Rust artifact cache footprint.
  target-lockfile:
    description: Cargo.lock path used for Rust artifact cache keying.
  target-lockfile-hash:
    description: Short hash of the Cargo.lock used for Rust artifact cache keying, or no-lock.
  toolchain:
    description: Exact Rust toolchain channel configured by rustup for the action.
runs:
  using: node20
  main: dist/main.js
  post: dist/post.js
  post-if: success()
