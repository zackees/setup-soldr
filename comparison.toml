[site]
title = "soldr rendered benchmarks"
default_threshold_ratio = 10.0
default_target = "x86_64-unknown-linux-gnu"
base_competitor = "swatinem"
soldr_note = "soldr uses managed zccache internally."

[phase1]
issue = 122
runner = "ubuntu-24.04"
target = "x86_64-unknown-linux-gnu"
command = "cargo build --package soldr-cli --release --locked --target {target} --timings"
default_threshold_ratio = 10.0

[native_sqlite]
issue = 312
label = "Native SQLite"
mode = "report-only"
fixture_manifest = "benchmarks/sqlite-native/Cargo.toml"
command = "cargo build --manifest-path benchmarks/sqlite-native/Cargo.toml --release --locked --target {target}"

[native_sqlite.policies]
enabled = "native-zccache-enabled"
disabled = "native-zccache-disabled"
control = "native-wrapper-disabled"

[[native_sqlite.targets]]
target = "x86_64-unknown-linux-gnu"
runner = "ubuntu-24.04"
os = "linux"
arch = "x86_64"

[[native_sqlite.targets]]
target = "aarch64-unknown-linux-gnu"
runner = "ubuntu-24.04-arm"
os = "linux"
arch = "aarch64"

[[native_sqlite.targets]]
target = "x86_64-unknown-linux-musl"
runner = "ubuntu-24.04"
os = "linux-musl"
arch = "x86_64"

[[native_sqlite.targets]]
target = "aarch64-unknown-linux-musl"
runner = "ubuntu-24.04-arm"
os = "linux-musl"
arch = "aarch64"

[[native_sqlite.targets]]
target = "x86_64-apple-darwin"
runner = "macos-15-intel"
os = "macos"
arch = "x86_64"

[[native_sqlite.targets]]
target = "aarch64-apple-darwin"
runner = "macos-15"
os = "macos"
arch = "aarch64"

[[native_sqlite.targets]]
target = "x86_64-pc-windows-msvc"
runner = "windows-2025"
os = "windows-msvc"
arch = "x86_64"

[[native_sqlite.targets]]
target = "aarch64-pc-windows-msvc"
runner = "windows-11-arm"
os = "windows-msvc"
arch = "aarch64"

[competitors.soldr]
label = "soldr"
backend = "zccache"
show = true

[competitors.swatinem]
label = "swatinem"
backend = "swatinem"
show = true

[[profiles]]
id = "release"
label = "Release build"
command = "soldr cargo build --package soldr-cli --release --locked --target {target}"
cargo_args = ["build", "--package", "soldr-cli", "--release", "--locked", "--target", "{target}"]
kind = "build"

[[profiles]]
id = "quick"
label = "Quick check"
command = "soldr cargo check -p soldr-cli --locked --target {target}"
cargo_args = ["check", "-p", "soldr-cli", "--locked", "--target", "{target}"]
kind = "build"

[[profiles]]
id = "lint"
label = "Lint"
command = "soldr cargo clippy --workspace --all-targets --locked --target {target} -- -D warnings"
cargo_args = ["clippy", "--workspace", "--all-targets", "--locked", "--target", "{target}", "--", "-D", "warnings"]
kind = "lint"

[[mutations]]
id = "soldr-cli"
label = "Top-of-tree edit"
path = "crates/soldr-cli/src/main.rs"

[[mutations]]
id = "soldr-core"
# Pre-monocrate this was `crates/soldr-core/src/lib.rs` (its own
# crate). PR #415 moved it to `crates/soldr-cli/src/core.rs`, and
# PR #520 split that single file into a `core/` sub-module tree —
# `core.rs` no longer exists, so the old path silently created a
# phantom file alongside `core/mod.rs` and rustc errored
# E0761 (issue #632). The mutation `id` stays as "soldr-core" so
# historic benchmark records remain comparable.
label = "Lower-module edit"
path = "crates/soldr-cli/src/core/mod.rs"
