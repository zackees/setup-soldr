# Reusable Rust CI workflow for repos that consume setup-soldr.
#
# Pattern: warm-then-fan-out. The `warm` job runs setup-soldr and a
# `soldr cargo build --workspace --all-targets`, populating the
# build/target/registry caches. Per-tool jobs (`fmt`, `lint`, `clippy`,
# `test`, `dylint`) then each re-run setup-soldr (same SHA -> same
# cache key, so the restore is a hot hit) and execute their respective
# `soldr cargo ...` invocation. Per-tool jobs are individually toggleable
# via boolean inputs.
#
# The default compile mode is cross-compilation. On ubuntu-latest this
# builds and tests x86_64-unknown-linux-musl unless the caller selects
# `compile-mode: native` or overrides `target`.
#
# Usage:
#
#   jobs:
#     ci:
#       uses: zackees/setup-soldr/.github/workflows/rust-ci.yml@v0
#       with:
#         os: ubuntu-latest
#
# See README.md "Reusable Rust CI workflow" for the full input table,
# native opt-in example, and cross-compile matrix example.

name: rust-ci (reusable)

on:
  workflow_call:
    inputs:
      os:
        description: Runner label (e.g. ubuntu-latest, macos-latest, windows-latest).
        type: string
        required: false
        default: ubuntu-latest
      compile-mode:
        description: Compilation mode. Accepted values are "cross" (default) and "native".
        type: string
        required: false
        default: cross
      target:
        description: >
          Rust target triple used when compile-mode is "cross". The default
          x86_64-unknown-linux-musl gives ubuntu-latest a real non-host target
          that can still run tests. Ignored when compile-mode is "native".
        type: string
        required: false
        default: x86_64-unknown-linux-musl
      working-directory:
        description: Directory containing the Rust workspace or package to check.
        type: string
        required: false
        default: "."
      toolchain:
        description: >
          Forwarded to setup-soldr's `toolchain` input. Empty (default) means
          setup-soldr resolves the toolchain from `rust-toolchain.toml` and
          falls back to stable.
        type: string
        required: false
        default: ""
      features:
        description: Forwarded as `--features <value>` on the warm build.
        type: string
        required: false
        default: ""
      cargo-args:
        description: Free-form extra args appended to the warm `soldr cargo build` invocation.
        type: string
        required: false
        default: ""
      cache:
        description: Forwarded to setup-soldr's `cache` umbrella input.
        type: boolean
        required: false
        default: true
      lint:
        description: When true, runs `cargo check --workspace --all-targets`.
        type: boolean
        required: false
        default: true
      fmt:
        description: When true, runs `cargo fmt --all -- --check`.
        type: boolean
        required: false
        default: true
      clippy:
        description: When true, runs `cargo clippy --workspace --all-targets -- -D warnings`.
        type: boolean
        required: false
        default: true
      test:
        description: When true, runs `cargo test --workspace`.
        type: boolean
        required: false
        default: true
      dylint:
        description: >
          When true, installs `cargo-dylint` + `dylint-link` and runs
          `cargo dylint --all --workspace`. Opt-in because dylint requires
          consumer-provided `dylint.toml` + driver crates.
        type: boolean
        required: false
        default: false
  workflow_dispatch:
    inputs:
      os:
        description: Runner label.
        type: string
        required: false
        default: ubuntu-latest
      compile-mode:
        description: Compilation mode.
        type: choice
        required: false
        default: cross
        options:
          - cross
          - native
      target:
        description: Rust target triple used when compile-mode is cross.
        type: string
        required: false
        default: x86_64-unknown-linux-musl
      working-directory:
        description: Directory containing the Rust workspace or package to check.
        type: string
        required: false
        default: scripts/bench-workloads/demo-small
      toolchain:
        description: Toolchain forwarded to setup-soldr.
        type: string
        required: false
        default: ""
      features:
        description: Features forwarded to the warm build.
        type: string
        required: false
        default: ""
      cargo-args:
        description: Extra args appended to the warm build.
        type: string
        required: false
        default: ""
      cache:
        description: Forward setup-soldr cache switch.
        type: boolean
        required: false
        default: true
      lint:
        description: Run cargo check.
        type: boolean
        required: false
        default: true
      fmt:
        description: Run cargo fmt --check.
        type: boolean
        required: false
        default: true
      clippy:
        description: Run cargo clippy.
        type: boolean
        required: false
        default: true
      test:
        description: Run cargo test.
        type: boolean
        required: false
        default: true
      dylint:
        description: Run cargo dylint.
        type: boolean
        required: false
        default: false

jobs:
  warm:
    name: warm (build)
    runs-on: ${{ inputs.os }}
    outputs:
      target: ${{ steps.mode.outputs.target }}
      cross_targets: ${{ steps.mode.outputs.cross_targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve compilation mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          mode="${{ inputs.compile-mode }}"
          target="${{ inputs.target }}"
          if [ -z "$mode" ]; then
            mode="cross"
          fi
          case "$mode" in
            cross)
              if [ -z "$target" ]; then
                target="x86_64-unknown-linux-musl"
              fi
              echo "target=$target" >> "$GITHUB_OUTPUT"
              echo "cross_targets=$target" >> "$GITHUB_OUTPUT"
              ;;
            native)
              echo "target=" >> "$GITHUB_OUTPUT"
              echo "cross_targets=" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error title=Invalid compile-mode::compile-mode must be 'cross' or 'native' (got '$mode')"
              exit 1
              ;;
          esac

      - name: Setup soldr
        id: setup
        uses: zackees/setup-soldr@v0
        with:
          toolchain: ${{ inputs.toolchain }}
          cache: ${{ inputs.cache }}
          cross-targets: ${{ steps.mode.outputs.cross_targets }}

      - name: Ensure rust-ci toolchain extras
        shell: bash
        run: |
          set -euo pipefail
          args=(toolchain ensure --json)
          channel="${{ steps.setup.outputs.toolchain }}"
          if [ -n "$channel" ]; then
            args+=(--channel "$channel")
          fi
          if [ "${{ inputs.fmt }}" = "true" ]; then
            args+=(--component rustfmt)
          fi
          if [ "${{ inputs.clippy }}" = "true" ]; then
            args+=(--component clippy)
          fi
          target="${{ steps.mode.outputs.target }}"
          if [ -n "$target" ]; then
            args+=(--target "$target")
          fi
          soldr "${args[@]}"

      - name: Warm build (workspace, all-targets)
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          args=(--workspace --all-targets)
          target="${{ steps.mode.outputs.target }}"
          if [ -n "$target" ]; then
            args+=(--target "$target")
          fi
          if [ -n "${{ inputs.features }}" ]; then
            args+=(--features "${{ inputs.features }}")
          fi
          # shellcheck disable=SC2206 # intentional word-split on cargo-args
          extra=(${{ inputs.cargo-args }})
          soldr cargo build "${args[@]}" "${extra[@]}"

  fmt:
    name: fmt
    needs: warm
    if: ${{ inputs.fmt }}
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup soldr
        id: setup
        uses: zackees/setup-soldr@v0
        with:
          toolchain: ${{ inputs.toolchain }}
          cache: ${{ inputs.cache }}

      - name: Ensure rust-ci toolchain extras
        shell: bash
        run: |
          set -euo pipefail
          args=(toolchain ensure --json)
          channel="${{ steps.setup.outputs.toolchain }}"
          if [ -n "$channel" ]; then
            args+=(--channel "$channel")
          fi
          args+=(--component rustfmt)
          soldr "${args[@]}"

      - name: cargo fmt --check
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: soldr cargo fmt --all -- --check

  lint:
    name: lint (cargo check)
    needs: warm
    if: ${{ inputs.lint }}
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup soldr
        id: setup
        uses: zackees/setup-soldr@v0
        with:
          toolchain: ${{ inputs.toolchain }}
          cache: ${{ inputs.cache }}
          cross-targets: ${{ needs.warm.outputs.cross_targets }}

      - name: Ensure rust-ci toolchain extras
        shell: bash
        run: |
          set -euo pipefail
          args=(toolchain ensure --json)
          channel="${{ steps.setup.outputs.toolchain }}"
          if [ -n "$channel" ]; then
            args+=(--channel "$channel")
          fi
          target="${{ needs.warm.outputs.target }}"
          if [ -n "$target" ]; then
            args+=(--target "$target")
          fi
          soldr "${args[@]}"

      - name: cargo check
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          args=(--workspace --all-targets)
          target="${{ needs.warm.outputs.target }}"
          if [ -n "$target" ]; then
            args+=(--target "$target")
          fi
          soldr cargo check "${args[@]}"

  clippy:
    name: clippy
    needs: warm
    if: ${{ inputs.clippy }}
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup soldr
        id: setup
        uses: zackees/setup-soldr@v0
        with:
          toolchain: ${{ inputs.toolchain }}
          cache: ${{ inputs.cache }}
          cross-targets: ${{ needs.warm.outputs.cross_targets }}

      - name: Ensure rust-ci toolchain extras
        shell: bash
        run: |
          set -euo pipefail
          args=(toolchain ensure --json --component clippy)
          channel="${{ steps.setup.outputs.toolchain }}"
          if [ -n "$channel" ]; then
            args+=(--channel "$channel")
          fi
          target="${{ needs.warm.outputs.target }}"
          if [ -n "$target" ]; then
            args+=(--target "$target")
          fi
          soldr "${args[@]}"

      - name: cargo clippy
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          args=(--workspace --all-targets)
          target="${{ needs.warm.outputs.target }}"
          if [ -n "$target" ]; then
            args+=(--target "$target")
          fi
          soldr cargo clippy "${args[@]}" -- -D warnings

  test:
    name: test
    needs: warm
    if: ${{ inputs.test }}
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup soldr
        id: setup
        uses: zackees/setup-soldr@v0
        with:
          toolchain: ${{ inputs.toolchain }}
          cache: ${{ inputs.cache }}
          cross-targets: ${{ needs.warm.outputs.cross_targets }}

      - name: Ensure rust-ci toolchain extras
        shell: bash
        run: |
          set -euo pipefail
          args=(toolchain ensure --json)
          channel="${{ steps.setup.outputs.toolchain }}"
          if [ -n "$channel" ]; then
            args+=(--channel "$channel")
          fi
          target="${{ needs.warm.outputs.target }}"
          if [ -n "$target" ]; then
            args+=(--target "$target")
          fi
          soldr "${args[@]}"

      - name: cargo test
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          args=(--workspace)
          target="${{ needs.warm.outputs.target }}"
          if [ -n "$target" ]; then
            args+=(--target "$target")
          fi
          soldr cargo test "${args[@]}"

  dylint:
    name: dylint
    needs: warm
    if: ${{ inputs.dylint }}
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup soldr
        id: setup
        uses: zackees/setup-soldr@v0
        with:
          toolchain: ${{ inputs.toolchain }}
          cache: ${{ inputs.cache }}

      - name: Install cargo-dylint and dylint-link
        shell: bash
        run: |
          set -euo pipefail
          soldr cargo install cargo-dylint dylint-link --locked

      - name: cargo dylint
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: soldr cargo dylint --all --workspace
