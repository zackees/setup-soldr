name: Setup Soldr Contract

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - action.yml
      - src/**
      - dist/**
      - __tests__/**
      - tests/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - .github/workflows/setup-soldr-action.yml
      - .github/workflows/setup-soldr-contract.yml
      - .github/workflows/zccache-build-demo.yml
  pull_request:
    paths:
      - README.md
      - action.yml
      - src/**
      - dist/**
      - __tests__/**
      - tests/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - .github/workflows/setup-soldr-action.yml
      - .github/workflows/setup-soldr-contract.yml
      - .github/workflows/zccache-build-demo.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  js-build:
    name: JS Build and Tests
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 LTS — required for `--experimental-strip-types` used by
          # `npm test` to run our TypeScript test files via node --test.
          # The action runtime declared in action.yml (`using: node20`) is
          # independent of this CI Node version; consumers run the bundled
          # dist/ on node20 regardless.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build dist bundles
        run: npm run build

      - name: Verify dist/ is up to date
        run: |
          set -euo pipefail
          if ! git diff --exit-code -- dist/; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result." >&2
            exit 1
          fi

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pytest
        shell: bash
        run: |
          set -euo pipefail
          python --version
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml

      - name: Run setup-soldr contract tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest \
            tests/test_action_target_cache_wiring.py \
            tests/test_release_rollout_contract.py \
            tests/test_zccache_build_demo_workflow.py
