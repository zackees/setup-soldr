name: Soldr Cache Speed Demo

on:
  push:
  workflow_dispatch:
    inputs:
      run_mode:
        description: Demo mode
        type: choice
        required: true
        default: Warm build only
        options:
          - Warm build only
          - Purge cache and run cold build before warm build

permissions:
  actions: write
  contents: read

concurrency:
  group: soldr-cache-speed-demo
  cancel-in-progress: false

env:
  DEMO_CACHE_SUFFIX: zccache-demo
  REQUESTED_INTEGRATION_REF: ${{ github.ref_name }}

jobs:
  purge-demo-caches:
    name: Purge demo caches
    if: ${{ inputs.run_mode == 'Purge cache and run cold build before warm build' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Delete demo caches recorded by the previous run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Find the most recent prior run of THIS workflow on THIS branch
          # whose cache-keys artifacts we can use as the deletion list.
          # Falls back to suffix-based deletion if there's no prior run yet
          # (first invocation after the manifest feature lands).
          prev_run_id=""
          prev_run_id=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/zccache-build-demo.yml/runs?branch=${GITHUB_REF_NAME}&per_page=20" \
            --jq ".workflow_runs[] | select(.id != ${GITHUB_RUN_ID}) | .id" \
            | head -n1 || true)

          touch keys-to-delete.txt

          if [ -n "${prev_run_id}" ]; then
            echo "Looking up cache-keys manifests from prior run ${prev_run_id}…"
            mkdir -p prev-manifests
            # Both manifests (cache-keys-cold-build, cache-keys-warm-build) live
            # under prev-manifests/<artifact-name>/setup-soldr-cache-keys.txt.
            gh run download "${prev_run_id}" \
              --repo "${GITHUB_REPOSITORY}" \
              --dir prev-manifests \
              --pattern 'cache-keys-*' || echo "(no cache-keys-* artifacts on prev run)"
            if compgen -G 'prev-manifests/*/setup-soldr-cache-keys.txt' >/dev/null; then
              cat prev-manifests/*/setup-soldr-cache-keys.txt | sort -u >> keys-to-delete.txt
            fi
          else
            echo "(no prior run found to source a manifest from)"
          fi

          # Fallback / belt-and-braces: also include any cache keys still
          # carrying the demo suffix, even though the manifest is normally
          # authoritative. This catches caches saved by old setup-soldr
          # builds (pre-kebab-fix) that never appeared in a manifest, and
          # any stragglers saved under refs/tags scopes.
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/actions/caches?per_page=100" \
            --paginate \
            --jq ".actions_caches[] | select(.key | contains(\"${DEMO_CACHE_SUFFIX}\")) | .key" \
            >> keys-to-delete.txt || true

          mapfile -t unique_keys < <(sort -u keys-to-delete.txt | sed '/^$/d')

          if [ "${#unique_keys[@]}" -eq 0 ]; then
            echo "No demo caches found to delete (clean slate)."
            exit 0
          fi

          {
            echo "### Purged demo caches"
            echo
            echo "| Cache ID | Ref | Key |"
            echo "| --- | --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

          deleted_count=0
          for key in "${unique_keys[@]}"; do
            # A single key can have multiple cache entries (different scope
            # refs, e.g. main + refs/tags/v0). Delete every entry per key.
            while read -r row; do
              [ -z "$row" ] && continue
              cache_id="${row%%$'\t'*}"
              rest="${row#*$'\t'}"
              cache_ref="${rest%%$'\t'*}"
              cache_key="${rest#*$'\t'}"
              echo "Deleting cache ${cache_id} (ref=${cache_ref}): ${cache_key}"
              if gh api --method DELETE \
                -H "Accept: application/vnd.github+json" \
                "/repos/${GITHUB_REPOSITORY}/actions/caches/${cache_id}"; then
                echo "| ${cache_id} | \`${cache_ref}\` | \`${cache_key}\` |" >> "$GITHUB_STEP_SUMMARY"
                deleted_count=$((deleted_count + 1))
              else
                echo "  (delete failed; ignoring)"
              fi
            done < <(
              gh api -H "Accept: application/vnd.github+json" \
                "/repos/${GITHUB_REPOSITORY}/actions/caches?key=${key}&per_page=50" \
                --jq '.actions_caches[] | "\(.id)\t\(.ref)\t\(.key)"' || true
            )
          done

          echo
          echo "Deleted ${deleted_count} cache entries across ${#unique_keys[@]} unique keys."

  cold-build:
    name: Cold zccache build after purge
    if: ${{ inputs.run_mode == 'Purge cache and run cold build before warm build' }}
    needs: purge-demo-caches
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout setup-soldr action
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: setup-soldr

      - id: resolve-refs
        name: Resolve upstream integration refs
        shell: bash
        run: |
          set -euo pipefail

          resolve_default_branch() {
            local repo="$1"
            git ls-remote --symref "https://github.com/${repo}.git" HEAD |
              awk '/^ref:/ {sub("refs/heads/", "", $2); print $2; exit}'
          }

          resolve_ref() {
            local repo="$1"
            local requested="$2"
            if git ls-remote --exit-code --heads "https://github.com/${repo}.git" "$requested" >/dev/null 2>&1; then
              printf '%s' "$requested"
              return
            fi
            local fallback
            fallback="$(resolve_default_branch "$repo")"
            if [ -z "$fallback" ]; then
              echo "Unable to resolve default branch for $repo" >&2
              exit 1
            fi
            printf '%s' "$fallback"
          }

          requested="$REQUESTED_INTEGRATION_REF"
          zccache_ref="$(resolve_ref zackees/zccache "$requested")"

          {
            echo "requested_ref=$requested"
            echo "zccache_ref=$zccache_ref"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout zccache
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: zackees/zccache
          ref: ${{ steps.resolve-refs.outputs.zccache_ref }}
          path: zccache
          persist-credentials: false

      - id: setup
        name: Setup Soldr
        uses: ./setup-soldr
        with:
          cache: true
          lockfile: zccache/Cargo.lock
          target-dir: zccache/target
          cache-key-suffix: ${{ env.DEMO_CACHE_SUFFIX }}
          repo: zackees/soldr
          stats: detailed
          debug: "true"
          shims: "true"
          compile-cache-stats: detailed
          logging: "true"

      - name: Show cache plan
        shell: bash
        run: |
          {
            echo "### Cold build cache state"
            echo
            echo "| Output | Value |"
            echo "| --- | --- |"
            echo "| soldr-version | \`${{ steps.setup.outputs.soldr-version }}\` |"
            echo "| soldr-install | \`release asset\` |"
            echo "| requested-integration-ref | \`${{ steps.resolve-refs.outputs.requested_ref }}\` |"
            echo "| zccache-ref | \`${{ steps.resolve-refs.outputs.zccache_ref }}\` |"
            echo "| cache-restore-status | \`${{ steps.setup.outputs.cache-restore-status }}\` |"
            echo "| build-cache-restore-status | \`${{ steps.setup.outputs.build-cache-restore-status }}\` |"
            echo "| build-cache-mode | \`${{ steps.setup.outputs.build-cache-mode }}\` |"
            echo "| target-cache-restore-status | \`${{ steps.setup.outputs.target-cache-restore-status }}\` |"
            echo "| target-cache-mode | \`${{ steps.setup.outputs.target-cache-mode }}\` |"
            echo "| target-lockfile-hash | \`${{ steps.setup.outputs.target-lockfile-hash }}\` |"
            echo "| stats-json | \`${{ steps.setup.outputs.stats-json }}\` |"
            echo "| compile-cache-hit-rate | \`${{ steps.setup.outputs.compile-cache-hit-rate }}\` |"
            echo "| compile-cache-hits | \`${{ steps.setup.outputs.compile-cache-hits }}\` |"
            echo "| compile-cache-misses | \`${{ steps.setup.outputs.compile-cache-misses }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build zccache cold
        shell: bash
        working-directory: zccache
        run: |
          set -o pipefail
          start="$(date +%s)"
          soldr cargo build --locked --package zccache-cli
          end="$(date +%s)"
          elapsed="$((end - start))"

          {
            echo
            echo "### Cold build result"
            echo
            echo "Built \`zccache-cli\` in \`${elapsed}s\` after purging demo caches."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload cache-keys manifest (cold)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cache-keys-cold-build
          path: ${{ runner.temp }}/setup-soldr-cache-keys.txt
          if-no-files-found: warn
          retention-days: 7

  warm-build:
    name: Warm zccache build with checked-out setup-soldr
    needs:
      - purge-demo-caches
      - cold-build
    if: ${{ always() && (inputs.run_mode != 'Purge cache and run cold build before warm build' || needs.cold-build.result == 'success') }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout setup-soldr action
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: setup-soldr

      - id: resolve-refs
        name: Resolve upstream integration refs
        shell: bash
        run: |
          set -euo pipefail

          resolve_default_branch() {
            local repo="$1"
            git ls-remote --symref "https://github.com/${repo}.git" HEAD |
              awk '/^ref:/ {sub("refs/heads/", "", $2); print $2; exit}'
          }

          resolve_ref() {
            local repo="$1"
            local requested="$2"
            if git ls-remote --exit-code --heads "https://github.com/${repo}.git" "$requested" >/dev/null 2>&1; then
              printf '%s' "$requested"
              return
            fi
            local fallback
            fallback="$(resolve_default_branch "$repo")"
            if [ -z "$fallback" ]; then
              echo "Unable to resolve default branch for $repo" >&2
              exit 1
            fi
            printf '%s' "$fallback"
          }

          requested="$REQUESTED_INTEGRATION_REF"
          zccache_ref="$(resolve_ref zackees/zccache "$requested")"

          {
            echo "requested_ref=$requested"
            echo "zccache_ref=$zccache_ref"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout zccache
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: zackees/zccache
          ref: ${{ steps.resolve-refs.outputs.zccache_ref }}
          path: zccache
          persist-credentials: false

      - id: setup
        name: Setup Soldr
        uses: ./setup-soldr
        with:
          cache: true
          lockfile: zccache/Cargo.lock
          target-dir: zccache/target
          cache-key-suffix: ${{ env.DEMO_CACHE_SUFFIX }}
          repo: zackees/soldr
          stats: detailed
          debug: "true"
          shims: "true"
          compile-cache-stats: detailed
          logging: "true"

      - name: Show cache plan
        shell: bash
        run: |
          {
            echo "### Warm build cache state"
            echo
            echo "| Output | Value |"
            echo "| --- | --- |"
            echo "| soldr-version | \`${{ steps.setup.outputs.soldr-version }}\` |"
            echo "| soldr-install | \`release asset\` |"
            echo "| requested-integration-ref | \`${{ steps.resolve-refs.outputs.requested_ref }}\` |"
            echo "| zccache-ref | \`${{ steps.resolve-refs.outputs.zccache_ref }}\` |"
            echo "| cache-restore-status | \`${{ steps.setup.outputs.cache-restore-status }}\` |"
            echo "| build-cache-restore-status | \`${{ steps.setup.outputs.build-cache-restore-status }}\` |"
            echo "| build-cache-mode | \`${{ steps.setup.outputs.build-cache-mode }}\` |"
            echo "| target-cache-restore-status | \`${{ steps.setup.outputs.target-cache-restore-status }}\` |"
            echo "| target-cache-mode | \`${{ steps.setup.outputs.target-cache-mode }}\` |"
            echo "| target-lockfile-hash | \`${{ steps.setup.outputs.target-lockfile-hash }}\` |"
            echo "| stats-json | \`${{ steps.setup.outputs.stats-json }}\` |"
            echo "| compile-cache-hit-rate | \`${{ steps.setup.outputs.compile-cache-hit-rate }}\` |"
            echo "| compile-cache-hits | \`${{ steps.setup.outputs.compile-cache-hits }}\` |"
            echo "| compile-cache-misses | \`${{ steps.setup.outputs.compile-cache-misses }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build zccache warm
        shell: bash
        working-directory: zccache
        run: |
          set -o pipefail
          start="$(date +%s)"
          soldr cargo build --locked --package zccache-cli
          end="$(date +%s)"
          elapsed="$((end - start))"

          {
            echo
            echo "### Warm build result"
            echo
            echo "Built \`zccache-cli\` in \`${elapsed}s\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload cache-keys manifest (warm)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cache-keys-warm-build
          path: ${{ runner.temp }}/setup-soldr-cache-keys.txt
          if-no-files-found: warn
          retention-days: 7
