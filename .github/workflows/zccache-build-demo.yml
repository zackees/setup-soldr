name: Soldr Cache Speed Demo

on:
  push:
  workflow_dispatch:
    inputs:
      run_mode:
        description: Demo mode
        type: choice
        required: true
        default: Warm build only
        options:
          - Warm build only
          - Purge cache and run cold build before warm build

permissions:
  actions: write
  contents: read

concurrency:
  group: soldr-cache-speed-demo
  cancel-in-progress: false

env:
  DEMO_CACHE_SUFFIX: zccache-demo
  REQUESTED_INTEGRATION_REF: ${{ github.ref_name }}

jobs:
  purge-demo-caches:
    name: Purge demo caches
    if: ${{ inputs.run_mode == 'Purge cache and run cold build before warm build' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Delete setup-soldr demo caches
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mapfile -t caches < <(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/actions/caches?per_page=100" \
              --paginate \
              --jq ".actions_caches[] | select(.key | contains(\"${DEMO_CACHE_SUFFIX}\")) | \"\\(.id)\\t\\(.key)\""
          )

          if [ "${#caches[@]}" -eq 0 ]; then
            echo "No setup-soldr demo caches matched suffix '${DEMO_CACHE_SUFFIX}'."
            exit 0
          fi

          {
            echo "### Purged demo caches"
            echo
            echo "| Cache ID | Key |"
            echo "| --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

          for cache in "${caches[@]}"; do
            cache_id="${cache%%$'\t'*}"
            cache_key="${cache#*$'\t'}"
            echo "Deleting cache ${cache_id}: ${cache_key}"
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/actions/caches/${cache_id}"
            echo "| ${cache_id} | \`${cache_key}\` |" >> "$GITHUB_STEP_SUMMARY"
          done

  cold-build:
    name: Cold zccache build after purge
    if: ${{ inputs.run_mode == 'Purge cache and run cold build before warm build' }}
    needs: purge-demo-caches
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout setup-soldr action
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: setup-soldr

      - id: resolve-refs
        name: Resolve upstream integration refs
        shell: bash
        run: |
          set -euo pipefail

          resolve_default_branch() {
            local repo="$1"
            git ls-remote --symref "https://github.com/${repo}.git" HEAD |
              awk '/^ref:/ {sub("refs/heads/", "", $2); print $2; exit}'
          }

          resolve_ref() {
            local repo="$1"
            local requested="$2"
            if git ls-remote --exit-code --heads "https://github.com/${repo}.git" "$requested" >/dev/null 2>&1; then
              printf '%s' "$requested"
              return
            fi
            local fallback
            fallback="$(resolve_default_branch "$repo")"
            if [ -z "$fallback" ]; then
              echo "Unable to resolve default branch for $repo" >&2
              exit 1
            fi
            printf '%s' "$fallback"
          }

          requested="$REQUESTED_INTEGRATION_REF"
          zccache_ref="$(resolve_ref zackees/zccache "$requested")"

          {
            echo "requested_ref=$requested"
            echo "zccache_ref=$zccache_ref"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout zccache
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: zackees/zccache
          ref: ${{ steps.resolve-refs.outputs.zccache_ref }}
          path: zccache
          persist-credentials: false

      - id: setup
        name: Setup Soldr
        uses: ./setup-soldr
        with:
          cache: true
          lockfile: zccache/Cargo.lock
          target-dir: zccache/target
          cache-key-suffix: ${{ env.DEMO_CACHE_SUFFIX }}
          repo: zackees/soldr

      - name: Show cache plan
        shell: bash
        run: |
          {
            echo "### Cold build cache state"
            echo
            echo "| Output | Value |"
            echo "| --- | --- |"
            echo "| soldr-version | \`${{ steps.setup.outputs.soldr-version }}\` |"
            echo "| soldr-install | \`release asset\` |"
            echo "| requested-integration-ref | \`${{ steps.resolve-refs.outputs.requested_ref }}\` |"
            echo "| zccache-ref | \`${{ steps.resolve-refs.outputs.zccache_ref }}\` |"
            echo "| cache-restore-status | \`${{ steps.setup.outputs.cache-restore-status }}\` |"
            echo "| build-cache-restore-status | \`${{ steps.setup.outputs.build-cache-restore-status }}\` |"
            echo "| build-cache-mode | \`${{ steps.setup.outputs.build-cache-mode }}\` |"
            echo "| target-cache-restore-status | \`${{ steps.setup.outputs.target-cache-restore-status }}\` |"
            echo "| target-cache-mode | \`${{ steps.setup.outputs.target-cache-mode }}\` |"
            echo "| target-lockfile-hash | \`${{ steps.setup.outputs.target-lockfile-hash }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build zccache cold
        shell: bash
        working-directory: zccache
        run: |
          set -o pipefail
          start="$(date +%s)"
          soldr cargo build --locked --package zccache-cli
          end="$(date +%s)"
          elapsed="$((end - start))"

          {
            echo
            echo "### Cold build result"
            echo
            echo "Built \`zccache-cli\` in \`${elapsed}s\` after purging demo caches."
          } >> "$GITHUB_STEP_SUMMARY"

  warm-build:
    name: Warm zccache build with checked-out setup-soldr
    needs:
      - purge-demo-caches
      - cold-build
    if: ${{ always() && (inputs.run_mode != 'Purge cache and run cold build before warm build' || needs.cold-build.result == 'success') }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout setup-soldr action
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: setup-soldr

      - id: resolve-refs
        name: Resolve upstream integration refs
        shell: bash
        run: |
          set -euo pipefail

          resolve_default_branch() {
            local repo="$1"
            git ls-remote --symref "https://github.com/${repo}.git" HEAD |
              awk '/^ref:/ {sub("refs/heads/", "", $2); print $2; exit}'
          }

          resolve_ref() {
            local repo="$1"
            local requested="$2"
            if git ls-remote --exit-code --heads "https://github.com/${repo}.git" "$requested" >/dev/null 2>&1; then
              printf '%s' "$requested"
              return
            fi
            local fallback
            fallback="$(resolve_default_branch "$repo")"
            if [ -z "$fallback" ]; then
              echo "Unable to resolve default branch for $repo" >&2
              exit 1
            fi
            printf '%s' "$fallback"
          }

          requested="$REQUESTED_INTEGRATION_REF"
          zccache_ref="$(resolve_ref zackees/zccache "$requested")"

          {
            echo "requested_ref=$requested"
            echo "zccache_ref=$zccache_ref"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout zccache
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: zackees/zccache
          ref: ${{ steps.resolve-refs.outputs.zccache_ref }}
          path: zccache
          persist-credentials: false

      - id: setup
        name: Setup Soldr
        uses: ./setup-soldr
        with:
          cache: true
          lockfile: zccache/Cargo.lock
          target-dir: zccache/target
          cache-key-suffix: ${{ env.DEMO_CACHE_SUFFIX }}
          repo: zackees/soldr

      - name: Show cache plan
        shell: bash
        run: |
          {
            echo "### Warm build cache state"
            echo
            echo "| Output | Value |"
            echo "| --- | --- |"
            echo "| soldr-version | \`${{ steps.setup.outputs.soldr-version }}\` |"
            echo "| soldr-install | \`release asset\` |"
            echo "| requested-integration-ref | \`${{ steps.resolve-refs.outputs.requested_ref }}\` |"
            echo "| zccache-ref | \`${{ steps.resolve-refs.outputs.zccache_ref }}\` |"
            echo "| cache-restore-status | \`${{ steps.setup.outputs.cache-restore-status }}\` |"
            echo "| build-cache-restore-status | \`${{ steps.setup.outputs.build-cache-restore-status }}\` |"
            echo "| build-cache-mode | \`${{ steps.setup.outputs.build-cache-mode }}\` |"
            echo "| target-cache-restore-status | \`${{ steps.setup.outputs.target-cache-restore-status }}\` |"
            echo "| target-cache-mode | \`${{ steps.setup.outputs.target-cache-mode }}\` |"
            echo "| target-lockfile-hash | \`${{ steps.setup.outputs.target-lockfile-hash }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build zccache warm
        shell: bash
        working-directory: zccache
        run: |
          set -o pipefail
          start="$(date +%s)"
          soldr cargo build --locked --package zccache-cli
          end="$(date +%s)"
          elapsed="$((end - start))"

          {
            echo
            echo "### Warm build result"
            echo
            echo "Built \`zccache-cli\` in \`${elapsed}s\`."
          } >> "$GITHUB_STEP_SUMMARY"
