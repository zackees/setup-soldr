name: Comparison cluster

# Third-party comparison (soldr vs Swatinem/rust-cache vs ...) benchmark
# suite. Origin is soldr's `cache-benchmark.yml` family plus the
# `comparison_report.py` renderer; per soldr#674 Phase 1 the comparison
# surface moved to setup-soldr because it belongs with the action, not
# the binary. The output renders at https://zackees.github.io/setup-soldr/.
#
# Layout post soldr#674 Phase 2 rewire:
#   - setup-soldr root: config (`comparison.toml`), fixture
#     (`benchmarks/sqlite-native/`), composite action
#     (`.github/actions/comparison-zccache/`), renderer
#     (`.github/scripts/comparison_report.py`)
#   - `soldr/` subdir: `zackees/soldr` checked out by `actions/checkout`
#     so the `cargo build --package soldr-cli` step and the
#     `crates/soldr-cli/*` mutation paths from `comparison.toml`
#     resolve correctly.
#
# workflow_dispatch-only by design — the matrix is expensive
# (8-target native-sqlite + cross-PR / restore-phase opt-ins) and
# results are published to GitHub Pages, so accidental runs are
# undesirable.
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Which mutation scenario set to run.
        required: true
        type: choice
        default: all
        options:
          - all
          - soldr-cli
          - soldr-core
      threshold_ratio:
        description: Warm build must be at least this many times faster than cold.
        required: true
        default: "10"
        type: string
      zccache_source_ref:
        description: >
          Git ref of zackees/zccache to build from source instead of installing
          the latest release. Use for measuring unreleased commits (#641).
          Empty (default) keeps the published-binary path on the scheduled run.
        required: false
        default: ""
        type: string
      include_restore_phase:
        description: >
          Also measure cache-archive + restore + restored-warm timings to expose
          the cross-job restore advantage (#639). Adds ~3-5 min per cell so it
          stays opt-in.
        required: false
        default: false
        type: boolean
      include_cross_pr:
        description: >
          Also measure the cross-PR sharing scenario (#650): seed cache with
          mutation A, switch to mutation B (different file), wipe target/,
          rebuild. swatinem has no cross-PR cache share so it pays a full
          cold-rebuild; soldr's content-addressed cache serves hits for
          unchanged units. Adds ~3-5 min per cell so it stays opt-in.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  # Cross-platform native C/C++ compiler cache validation (issue #312).
  # The fixture (`benchmarks/sqlite-native/`) compiles bundled SQLite C
  # sources via cc-rs — the same workload that drives the sqlite-link
  # perf regression in #491. Each cell measures cold vs warm wall-time
  # with the zccache CC/CXX wrapper enabled and a disabled control row.
  # `mode = "report-only"` in comparison.toml: no enforced speedup gate;
  # the hard gate lives in .github/workflows/perf-matrix.yml's
  # `sqlite-link/cold-tar-untar-warm` cell. See
  # docs/NATIVE_SQLITE_BENCHMARK.md for how to read the results.
  #
  # The benchmark runs in two stages so the work doubles up correctly
  # against the runner pool (2N instead of N):
  #
  #   `native-sqlite-build` (N=8 cells on linux x86): cross-compile
  #     zccache for each target using setup-soldr's `cross-targets`
  #     input (v0.9.63) + soldr 0.7.59's `prepare --target` composite.
  #     Dogfoods both features and gets the expensive build work onto
  #     fast ubuntu runners instead of slow ARM/macOS/Windows ones.
  #
  #   `native-sqlite-test` (N=8 cells on target-native runners): pull
  #     the cross-compiled zccache via artifact, then run the actual
  #     cold-vs-warm compile-time perf measurement on the target's
  #     native CPU.
  native-sqlite-build:
    name: Cross-build zccache for ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - name: Checkout setup-soldr (action under test)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout zackees/zccache (source to cross-compile)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: zackees/zccache
          path: zccache-src
          persist-credentials: false

      - id: setup
        name: Setup Soldr with cross-target ${{ matrix.target }}
        uses: ./
        with:
          cross-targets: ${{ matrix.target }}

      - name: Provision cross-toolchain via soldr prepare
        # setup-soldr's `cross-targets` cross-bootstrap covers
        # linux-musl, apple-darwin, and windows-gnu lanes natively.
        # For the other lanes (linux-gnu cross to aarch64, windows-msvc),
        # soldr 0.7.59's `prepare --target` fills in cargo-xwin /
        # clang-cl / cross-cc. Idempotent on supported lanes.
        shell: bash
        run: soldr prepare --target "${{ matrix.target }}"

      - name: Cross-build zccache-cli
        shell: bash
        working-directory: zccache-src
        run: |
          soldr cargo build --release --locked --target "${{ matrix.target }}" --package zccache-cli

      - name: Stage zccache binaries
        shell: bash
        env:
          TGT: ${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p staging
          if [[ "$TGT" == *-pc-windows-* ]]; then
            cp "zccache-src/target/${TGT}/release/zccache.exe" staging/
            cp "zccache-src/target/${TGT}/release/zccache-daemon.exe" staging/
          else
            cp "zccache-src/target/${TGT}/release/zccache" staging/
            cp "zccache-src/target/${TGT}/release/zccache-daemon" staging/
          fi
          ls -la staging/

      - name: Upload cross-compiled zccache binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: zccache-cross-${{ matrix.target }}
          path: staging/
          if-no-files-found: error
          retention-days: 7

  native-sqlite-test:
    name: Native SQLite (${{ matrix.target }})
    needs: native-sqlite-build
    runs-on: ${{ matrix.runner }}
    env:
      # Bypass rust-toolchain.toml's `components = ["rustfmt", "clippy"]` so
      # cargo does not ask rustup to install clippy at build time. On macos-15
      # ARM runners that triggers a `bin/cargo-clippy` conflict against the
      # runner image's pre-installed toolchain. See zackees/soldr#330.
      RUSTUP_TOOLCHAIN: "1.94.1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            os: linux
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            os: linux
            arch: aarch64
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04
            os: linux-musl
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            os: linux-musl
            arch: aarch64
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            os: macos
            arch: x86_64
          - target: aarch64-apple-darwin
            runner: macos-15
            os: macos
            arch: aarch64
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            os: windows-msvc
            arch: x86_64
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            os: windows-msvc
            arch: aarch64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94.1
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        shell: bash
        run: |
          set -euo pipefail
          attempts=0
          max_attempts=3
          until sudo apt-get update; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "apt-get update failed after $max_attempts attempts" >&2
              exit 1
            fi
            sleep $((attempts * 3))
          done
          attempts=0
          until sudo apt-get install -y --no-install-recommends musl-tools; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "apt-get install musl-tools failed after $max_attempts attempts" >&2
              exit 1
            fi
            sleep $((attempts * 3))
          done
          dpkg-query -W -f='musl-tools installed version: ${Version}\n' musl-tools

      - name: Download cross-compiled zccache
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: zccache-cross-${{ matrix.target }}
          path: ${{ runner.temp }}/zccache-bin

      - name: Add cross-compiled zccache to PATH
        shell: bash
        run: |
          set -euo pipefail
          BIN_DIR="$RUNNER_TEMP/zccache-bin"
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod +x "$BIN_DIR/zccache" "$BIN_DIR/zccache-daemon" 2>/dev/null || true
          fi
          echo "$BIN_DIR" >> "$GITHUB_PATH"
          ls -la "$BIN_DIR"
          # Sanity check that the cross-built binary runs natively here.
          # Failure here means the cross-compile target/host mismatch is wrong.
          (export PATH="$BIN_DIR:$PATH" && zccache --version)

      - name: Run native SQLite benchmark
        shell: bash
        env:
          NATIVE_SQLITE_ARCH: ${{ matrix.arch }}
          NATIVE_SQLITE_OS: ${{ matrix.os }}
          NATIVE_SQLITE_RESULT_PATH: benchmark-summary/native-sqlite-${{ matrix.target }}.json
          NATIVE_SQLITE_RUNNER: ${{ matrix.runner }}
          NATIVE_SQLITE_TARGET: ${{ matrix.target }}
          ZCCACHE_CACHE_DIR: ${{ runner.temp }}/native-sqlite-zccache
        run: |
          set -euo pipefail
          PYTHON_BIN=python3
          if ! command -v "$PYTHON_BIN" >/dev/null 2>&1; then
            PYTHON_BIN=python
          fi
          "$PYTHON_BIN" - <<'PY'
          import json
          import os
          import shutil
          import subprocess
          import sys
          import time
          import tomllib
          from pathlib import Path

          target = os.environ["NATIVE_SQLITE_TARGET"]
          runner = os.environ["NATIVE_SQLITE_RUNNER"]
          os_name = os.environ["NATIVE_SQLITE_OS"]
          arch = os.environ["NATIVE_SQLITE_ARCH"]
          result_path = Path(os.environ["NATIVE_SQLITE_RESULT_PATH"])
          cache_dir = Path(os.environ["ZCCACHE_CACHE_DIR"])
          target_dir = Path(os.environ["RUNNER_TEMP"]) / f"sqlite-native-target-{target}"

          config = tomllib.loads(Path("comparison.toml").read_text(encoding="utf-8"))
          native_config = config["native_sqlite"]
          policies = native_config["policies"]
          manifest = Path(native_config["fixture_manifest"])
          command = [
              "cargo",
              "build",
              "--manifest-path",
              str(manifest),
              "--release",
              "--locked",
              "--target",
              target,
          ]

          def rounded(value):
              return None if value is None else round(value, 2)

          def base_row(policy, result="success"):
              return {
                  "target": target,
                  "runner": runner,
                  "os": os_name,
                  "arch": arch,
                  "policy": policy,
                  "command": native_config["command"].format(target=target),
                  "cold_seconds": None,
                  "seed_seconds": None,
                  "warm_seconds": None,
                  "speedup_ratio": None,
                  "cache_hit_detail": None,
                  "zccache_stats": {},
                  "result": result,
              }

          def write_payload(rows):
              result_path.parent.mkdir(parents=True, exist_ok=True)
              result_path.write_text(
                  json.dumps({"native_sqlite": rows}, indent=2) + "\n",
                  encoding="utf-8",
              )

          def append_summary(rows):
              summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
              if not summary_path:
                  return
              lines = [
                  "### Native SQLite Benchmark",
                  "",
                  f"- target: `{target}`",
                  f"- runner: `{runner}`",
                  f"- mode: `{native_config['mode']}`",
                  "",
                  "| policy | result | cold | seed | warm | speedup |",
                  "| --- | --- | ---: | ---: | ---: | ---: |",
              ]
              for row in rows:
                  def seconds(value):
                      return "n/a" if value is None else f"{float(value):.2f}s"
                  def ratio(value):
                      return "n/a" if value is None else f"{float(value):.2f}x"
                  lines.append(
                      f"| `{row['policy']}` | `{row['result']}` | "
                      f"`{seconds(row['cold_seconds'])}` | "
                      f"`{seconds(row['seed_seconds'])}` | "
                      f"`{seconds(row['warm_seconds'])}` | "
                      f"`{ratio(row['speedup_ratio'])}` |"
                  )
              with Path(summary_path).open("a", encoding="utf-8") as handle:
                  handle.write("\n".join(lines) + "\n")

          def run_quiet(args, check):
              return subprocess.run(
                  args,
                  check=check,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              )

          def reset_target_dir():
              shutil.rmtree(target_dir, ignore_errors=True)

          def reset_zccache():
              run_quiet(["zccache", "stop"], check=False)
              shutil.rmtree(cache_dir, ignore_errors=True)
              cache_dir.mkdir(parents=True, exist_ok=True)
              run_quiet(["zccache", "start"], check=True)

          def zccache_status():
              proc = subprocess.run(
                  ["zccache", "status"],
                  check=False,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.STDOUT,
                  text=True,
              )
              return proc.stdout.strip()

          if target.endswith("pc-windows-msvc"):
              if shutil.which("clang-cl") is None:
                  row = base_row(policies["enabled"], result="unsupported")
                  row["cache_hit_detail"] = "windows-msvc native benchmark requires clang-cl, but clang-cl was not on PATH"
                  rows = [row]
                  write_payload(rows)
                  append_summary(rows)
                  sys.exit(0)
              direct_cc = "clang-cl"
              direct_cxx = "clang-cl"
              wrapped_cc = "zccache clang-cl"
              wrapped_cxx = "zccache clang-cl"
          else:
              direct_cc = "cc"
              direct_cxx = "c++"
              wrapped_cc = "zccache cc"
              wrapped_cxx = "zccache c++"

          def run_build(native_wrapper_enabled):
              env = os.environ.copy()
              env["CARGO_INCREMENTAL"] = "0"
              env["CARGO_TARGET_DIR"] = str(target_dir)
              env["CARGO_TERM_COLOR"] = "never"
              env.pop("RUSTC_WRAPPER", None)
              env.pop("RUSTC_WORKSPACE_WRAPPER", None)
              env.pop("CC_KNOWN_WRAPPER_CUSTOM", None)
              env.pop("ZCCACHE_PATH_REMAP", None)

              if native_wrapper_enabled:
                  env["CC_KNOWN_WRAPPER_CUSTOM"] = "zccache"
                  env["ZCCACHE_PATH_REMAP"] = "auto"
                  env["CC"] = wrapped_cc
                  env["CXX"] = wrapped_cxx
              else:
                  env["CC"] = direct_cc
                  env["CXX"] = direct_cxx

              start = time.perf_counter()
              subprocess.run(command, env=env, check=True)
              return time.perf_counter() - start

          cold_seconds = None
          seed_seconds = None
          warm_seconds = None
          seed_stats = ""
          warm_stats = ""
          rows = []
          stage = "setup"

          try:
              stage = "cold-control"
              reset_zccache()
              reset_target_dir()
              cold_seconds = run_build(native_wrapper_enabled=False)

              stage = "seed-native-cache"
              reset_zccache()
              reset_target_dir()
              seed_seconds = run_build(native_wrapper_enabled=True)
              seed_stats = zccache_status()

              stage = "warm-native-cache"
              reset_target_dir()
              warm_seconds = run_build(native_wrapper_enabled=True)
              warm_stats = zccache_status()

              enabled = base_row(policies["enabled"])
              enabled["cold_seconds"] = rounded(cold_seconds)
              enabled["seed_seconds"] = rounded(seed_seconds)
              enabled["warm_seconds"] = rounded(warm_seconds)
              enabled["speedup_ratio"] = rounded(cold_seconds / warm_seconds if warm_seconds else None)
              enabled["cache_hit_detail"] = (
                  f"native_wrapper=true;cc={wrapped_cc};target_dir_reset=true;"
                  "zccache_path_remap=auto"
              )
              enabled["zccache_stats"] = {
                  "after_seed": seed_stats,
                  "after_warm": warm_stats,
              }
              rows.append(enabled)

              try:
                  stage = "disabled-native-cache-warm"
                  reset_target_dir()
                  disabled_warm_seconds = run_build(native_wrapper_enabled=False)
              except subprocess.CalledProcessError as exc:
                  disabled = base_row(policies["disabled"], result="failure")
                  disabled["cold_seconds"] = rounded(cold_seconds)
                  disabled["cache_hit_detail"] = (
                      f"native_wrapper=false;cc={direct_cc};stage={stage};"
                      f"returncode={exc.returncode}"
                  )
              else:
                  disabled = base_row(policies["disabled"])
                  disabled["cold_seconds"] = rounded(cold_seconds)
                  disabled["warm_seconds"] = rounded(disabled_warm_seconds)
                  disabled["speedup_ratio"] = rounded(
                      cold_seconds / disabled_warm_seconds if disabled_warm_seconds else None
                  )
                  disabled["cache_hit_detail"] = (
                      f"native_wrapper=false;cc={direct_cc};target_dir_reset=true"
                  )
              rows.append(disabled)

              write_payload(rows)
              append_summary(rows)
          except subprocess.CalledProcessError as exc:
              row = base_row(policies["enabled"], result="failure")
              row["cold_seconds"] = rounded(cold_seconds)
              row["seed_seconds"] = rounded(seed_seconds)
              row["warm_seconds"] = rounded(warm_seconds)
              row["cache_hit_detail"] = f"stage={stage};returncode={exc.returncode}"
              row["zccache_stats"] = {
                  "after_seed": seed_stats,
                  "after_warm": warm_stats,
              }
              rows = [row]
              write_payload(rows)
              append_summary(rows)
              if native_config["mode"] != "report-only":
                  sys.exit(exc.returncode or 1)
          finally:
              run_quiet(["zccache", "stop"], check=False)
          PY

      - name: Cleanup zccache
        if: ${{ always() }}
        uses: ./.github/actions/comparison-zccache-cleanup

      - name: Upload native SQLite benchmark artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: native-sqlite-benchmark-${{ matrix.target }}
          path: benchmark-summary/native-sqlite-${{ matrix.target }}.json
          if-no-files-found: error

  benchmark:
    name: Config-driven benchmark
    needs:
      - native-sqlite-test
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      issues: write
      pages: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout setup-soldr (config + scripts + composite action)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout zackees/soldr (workspace for cargo build + mutations)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: zackees/soldr
          path: soldr
          persist-credentials: false

      - name: Resolve benchmark config
        id: config
        shell: bash
        env:
          BENCHMARK_CONFIG_PATH: comparison.toml
          INPUT_THRESHOLD_RATIO: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.threshold_ratio || '' }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          config = tomllib.loads(Path(os.environ["BENCHMARK_CONFIG_PATH"]).read_text(encoding="utf-8"))
          target = config["site"].get("default_target", "x86_64-unknown-linux-gnu")
          threshold = os.environ["INPUT_THRESHOLD_RATIO"] or str(
              config["site"].get("default_threshold_ratio", 10.0)
          )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"target={target}\n")
              fh.write(f"threshold_ratio={threshold}\n")
          PY

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.94.1
          targets: ${{ steps.config.outputs.target }}

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: cache-benchmark-${{ steps.config.outputs.target }}
          workspaces: soldr -> target

      - name: Build soldr
        shell: bash
        working-directory: soldr
        run: cargo build --package soldr-cli --release --locked --target "${{ steps.config.outputs.target }}"

      - name: Add built soldr to PATH
        shell: bash
        run: echo "$GITHUB_WORKSPACE/soldr/target/${{ steps.config.outputs.target }}/release" >> "$GITHUB_PATH"

      - name: Prepare zccache tool
        uses: ./.github/actions/comparison-zccache
        with:
          cache-cargo-registry: "false"
          cache-compilation: "false"
          cache-dir: ${{ runner.temp }}/run-benchmark-zccache
          cache-target: "false"
          save-cache: "false"
          zccache-source-ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.zccache_source_ref || '' }}

      - name: Run configured benchmarks
        shell: bash
        env:
          BENCHMARK_COMMAND_TARGET: ${{ steps.config.outputs.target }}
          BENCHMARK_CONFIG_PATH: comparison.toml
          BENCHMARK_RESULTS_JSON: benchmark-summary/cache-benchmark-results.json
          SCENARIO: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.scenario || 'all' }}
          THRESHOLD_RATIO: ${{ steps.config.outputs.threshold_ratio }}
          # Issue #637: emit per-miss phase breakdown to the daemon log so
          # next-round zccache optimization decisions can be made from data
          # instead of guesses. The env var is a daemon-side gate
          # (zccache::daemon::server::handle_compile::pipeline) and is a no-op
          # when unset, so the cost is borne only here.
          ZCCACHE_PROFILE_RUST_MISS: "1"
          # Issue #639: opt-in cross-job-restore measurement — surfaces the
          # archive/restore/restored-warm cycle that's hidden by the
          # same-job-seed scenario. Defaults off so the scheduled run stays
          # fast; flip via workflow_dispatch when chasing the 2x story.
          INCLUDE_RESTORE_PHASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.include_restore_phase || 'false' }}
          # Issue #650: cross-PR cache sharing measurement.
          #
          # Enabled on **every** event source except a workflow_dispatch
          # that explicitly opts out. The reason it's always-on is the
          # publish race: when a push bench finishes after a dispatched
          # cross-PR bench, the push run's `latest.json` (no
          # cross_pr_build_seconds fields) overwrites the dispatched
          # run's, and the rendered headline loses the cross-PR clause.
          # Paying the +30 min per push bench is worth the guarantee
          # that the published page reflects the canonical state.
          INCLUDE_CROSS_PR: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.include_cross_pr == 'false' && 'false') || 'true' }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import shutil
          import subprocess
          import time
          import tomllib
          from pathlib import Path

          class SafeFormatDict(dict):
              def __missing__(self, key):
                  return "{" + key + "}"


          # setup-soldr/ contains config + scripts; soldr/ is the cargo workspace
          # the benchmark mutates (`crates/soldr-cli/*` paths in comparison.toml
          # resolve under repo_root). See workflow header for the soldr#674
          # Phase 2 layout.
          repo_root = Path.cwd() / "soldr"
          config = tomllib.loads(Path(os.environ["BENCHMARK_CONFIG_PATH"]).read_text(encoding="utf-8"))
          target = os.environ["BENCHMARK_COMMAND_TARGET"]
          threshold = float(os.environ["THRESHOLD_RATIO"])
          scenario = os.environ["SCENARIO"]
          output_path = Path(os.environ["BENCHMARK_RESULTS_JSON"])

          selected_mutations = [
              mutation
              for mutation in config["mutations"]
              if scenario == "all" or mutation["id"] == scenario
          ]
          competitors = [
              {"id": competitor_id, **competitor}
              for competitor_id, competitor in config["competitors"].items()
              if competitor.get("show", True)
          ]
          profiles = list(config["profiles"])

          def render_parts(parts):
              return [part.format_map(SafeFormatDict(target=target)) for part in parts]

          def clean_workspace():
              subprocess.run(
                  ["git", "reset", "--hard", "HEAD"],
                  cwd=repo_root,
                  check=True,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              )
              subprocess.run(
                  ["git", "clean", "-fdx"],
                  cwd=repo_root,
                  check=True,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              )

          def reset_backend(backend):
              if backend == "zccache":
                  subprocess.run(["zccache", "stop"], check=False, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                  zccache_dir = Path(os.environ.get("ZCCACHE_CACHE_DIR") or Path.home() / ".zccache")
                  shutil.rmtree(zccache_dir, ignore_errors=True)
              subprocess.run(["cargo", "clean"], cwd=repo_root, check=False, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)

          def apply_mutation(mutation):
              mutation_path = repo_root / mutation["path"]
              with mutation_path.open("a", encoding="utf-8") as handle:
                  handle.write(f"\n// cache benchmark mutation: {mutation['id']}\n")

          def run_cargo(profile, backend):
              command = ["cargo", *render_parts(profile["cargo_args"])]
              env = os.environ.copy()
              env["CARGO_TERM_COLOR"] = "never"
              env.pop("RUSTC_WRAPPER", None)
              if backend == "zccache":
                  subprocess.run(["zccache", "start"], check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                  env["RUSTC_WRAPPER"] = "zccache"
              start = time.perf_counter()
              subprocess.run(command, cwd=repo_root, env=env, check=True)
              return time.perf_counter() - start

          def _dir_size_bytes(path):
              """Walk path and return total file bytes; None on missing."""
              if not path or not Path(path).is_dir():
                  return None
              total = 0
              for root, _dirs, files in os.walk(path):
                  for name in files:
                      try:
                          total += (Path(root) / name).stat().st_size
                      except OSError:
                          pass
              return total

          # Issue #645: both backends pay the same cargo baseline.
          # `Swatinem/rust-cache` persists exactly these three subdirs of
          # `$CARGO_HOME` plus each workspace's `target/`. The cache-benchmark
          # zccache shim defaults `cache-cargo-registry: true`, so soldr-managed
          # CI cycles persist the same three baseline subdirs plus
          # `$ZCCACHE_CACHE_DIR`. The shared baseline cancels in the headline
          # ratio; only the backend-specific delta (`target/` vs zccache dir)
          # drives the structural advantage. Pre-#645 the measurement walked
          # the full `$CARGO_HOME` for swatinem and only the zccache dir for
          # soldr, biasing both directions.
          CARGO_CACHE_SUBDIRS = ("registry", "git", "bin")

          def _backend_cache_roots(backend):
              """Directories the backend would archive for cross-job restore.

              See the `Swatinem/rust-cache` `cachePaths` definition and the
              repo-local `comparison-zccache` shim defaults; the lists
              are deliberately the same for the common (cargo) bits and
              differ only on the backend-specific tail.
              """
              cargo_home = Path(os.environ.get("CARGO_HOME") or Path.home() / ".cargo")
              roots = [cargo_home / sub for sub in CARGO_CACHE_SUBDIRS]
              if backend == "swatinem":
                  roots.append(repo_root / "target")
              elif backend == "zccache":
                  zdir = os.environ.get("ZCCACHE_CACHE_DIR")
                  if zdir:
                      roots.append(Path(zdir))
              return [p for p in roots if p.is_dir()]

          def measure_cache_size_bytes(backend):
              """Per-backend persisted-cache size *after* the warm run.

              Issue #639 + #645: the headline number is silent on the
              storage cost of each backend, which matters for the 8 GiB
              cache budget claim the project tracks against real-world
              workspaces (e.g. fbuild). The measurement walks the exact
              union the backend's CI action persists — the shared cargo
              baseline cancels in the headline ratio and only the
              backend-specific delta drives the structural advantage.
              """
              roots = _backend_cache_roots(backend)
              if not roots:
                  return None
              total = 0
              for root in roots:
                  sz = _dir_size_bytes(root)
                  if sz is not None:
                      total += sz
              return total or None

          def measure_restore_phase(backend, profile, mutation):
              """Snapshot → wipe → restore → warm rebuild cycle.

              Returns a dict with archive_seconds / archive_bytes /
              restore_seconds / restored_warm_seconds (or None values
              when the cycle could not run).

              Issue #639: exposes the cross-job restore advantage that the
              same-job-seed scenario hides. Local untar is a *lower bound*
              on GHA cache restore time (no network round-trip), but the
              proportional gap between backends carries through because
              both backends pay the same untar throughput on the same
              runner. Use the size + restore-time pair to extrapolate the
              real CI cost.
              """
              import tarfile
              import tempfile

              phase = {
                  "archive_seconds": None,
                  "archive_bytes": None,
                  "restore_seconds": None,
                  "restored_warm_seconds": None,
              }
              roots = _backend_cache_roots(backend)
              if not roots:
                  return phase
              archive_path = Path(tempfile.mkdtemp()) / f"{backend}-cache.tar.gz"
              start = time.perf_counter()
              with tarfile.open(archive_path, "w:gz", compresslevel=3) as tar:
                  for root in roots:
                      tar.add(root, arcname=root.name)
              phase["archive_seconds"] = round(time.perf_counter() - start, 2)
              phase["archive_bytes"] = archive_path.stat().st_size

              # Wipe every backed-up location and let the restore put bytes
              # back in their original paths.
              clean_workspace()
              reset_backend(backend)
              for root in roots:
                  shutil.rmtree(root, ignore_errors=True)

              start = time.perf_counter()
              with tarfile.open(archive_path, "r:gz") as tar:
                  # Each member's name starts with `root.name/...` (or just
                  # `root.name`); since the roots are top-level directories
                  # we restore each into its original parent.
                  for member in tar.getmembers():
                      parts = Path(member.name).parts
                      if not parts:
                          continue
                      head = parts[0]
                      parent = next(
                          (root.parent for root in roots if root.name == head),
                          None,
                      )
                      if parent is None:
                          continue
                      tar.extract(member, parent)
              phase["restore_seconds"] = round(time.perf_counter() - start, 2)

              try:
                  apply_mutation(mutation)
                  phase["restored_warm_seconds"] = round(run_cargo(profile, backend), 2)
              except subprocess.CalledProcessError:
                  phase["restored_warm_seconds"] = None

              return phase

          # Issue #650: cross-PR mutation pair. branch-A and branch-B touch
          # two different deep modules of `soldr-cli`. Both invalidate the
          # `soldr-cli` crate's compilation but neither invalidates the dep
          # graph upstream, so a content-addressed cache populated by
          # branch-A serves hits for every dep when branch-B then builds.
          # swatinem caches by-key per the PR's commit SHA, so the branch-B
          # job in real CI has no cache to restore from branch-A — we
          # simulate that by NOT restoring any backend cache for swatinem.
          CROSS_PR_BRANCH_A_PATH = "crates/soldr-cli/src/fetch/github.rs"
          CROSS_PR_BRANCH_B_PATH = "crates/soldr-cli/src/core/git.rs"

          def _apply_mutation_at(path_str, marker):
              p = repo_root / path_str
              with p.open("a", encoding="utf-8") as handle:
                  handle.write(f"\n// cache benchmark mutation: {marker}\n")

          def measure_cross_pr_sharing(profile, backend):
              """Cross-PR cache-share simulation.

              For soldr the zccache content store is retained between the
              branch-A seed and the branch-B build (target/ is wiped to
              force cargo to invoke rustc per unit so the cache is
              actually consulted). swatinem has no cross-PR mechanism, so
              its branch-B build is effectively cold (cache + target wiped).

              Returns `{branch_a_seed_seconds, branch_b_seconds}`.
              """
              phase = {
                  "cross_pr_seed_seconds": None,
                  "cross_pr_build_seconds": None,
              }
              # Branch A seed: clean state, apply branch-A mutation, run cargo
              # with the backend wrapper so the cache populates.
              clean_workspace()
              reset_backend(backend)
              _apply_mutation_at(CROSS_PR_BRANCH_A_PATH, "cross-pr-branch-a")
              start = time.perf_counter()
              subprocess.run(
                  ["cargo", *render_parts(profile["cargo_args"])],
                  cwd=repo_root,
                  env=_cargo_env_for(backend),
                  check=True,
              )
              phase["cross_pr_seed_seconds"] = round(time.perf_counter() - start, 2)

              # Switch to branch B: revert the workspace (drops branch-A's
              # marker), wipe target/ so cargo re-invokes rustc per unit.
              # For zccache: KEEP the cache (content store), so unchanged
              # crates serve from cache. For swatinem (no wrapper): there's
              # no out-of-band cache so the cargo clean is the only state
              # change — the build is effectively cold.
              clean_workspace()
              subprocess.run(
                  ["cargo", "clean"],
                  cwd=repo_root,
                  check=False,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              )
              _apply_mutation_at(CROSS_PR_BRANCH_B_PATH, "cross-pr-branch-b")
              try:
                  start = time.perf_counter()
                  subprocess.run(
                      ["cargo", *render_parts(profile["cargo_args"])],
                      cwd=repo_root,
                      env=_cargo_env_for(backend),
                      check=True,
                  )
                  phase["cross_pr_build_seconds"] = round(time.perf_counter() - start, 2)
              except subprocess.CalledProcessError:
                  pass
              return phase

          def _cargo_env_for(backend):
              env = os.environ.copy()
              env["CARGO_TERM_COLOR"] = "never"
              env.pop("RUSTC_WRAPPER", None)
              if backend == "zccache":
                  subprocess.run(
                      ["zccache", "start"],
                      check=True,
                      stdout=subprocess.DEVNULL,
                      stderr=subprocess.DEVNULL,
                  )
                  env["RUSTC_WRAPPER"] = "zccache"
              return env

          results = []
          failures = []

          for mutation in selected_mutations:
              for profile in profiles:
                  for competitor in competitors:
                      backend = competitor["backend"]
                      result = {
                          "competitor": competitor["id"],
                          "profile": profile["id"],
                          "mutation": mutation["id"],
                          "result": "success",
                          "cold_seconds": None,
                          "warm_seconds": None,
                          "saved_seconds": None,
                          "speedup_ratio": None,
                          "cache_hit": False,
                          "cache_hit_detail": f"backend={backend};same_job_seed=true",
                          "cache_dir_bytes": None,
                          "archive_seconds": None,
                          "archive_bytes": None,
                          "restore_seconds": None,
                          "restored_warm_seconds": None,
                          "cross_pr_seed_seconds": None,
                          "cross_pr_build_seconds": None,
                          "threshold_failed": False,
                      }

                      try:
                          clean_workspace()
                          reset_backend("none")
                          apply_mutation(mutation)
                          cold_seconds = run_cargo(profile, "none")

                          clean_workspace()
                          reset_backend(backend)
                          run_cargo(profile, backend)
                          apply_mutation(mutation)
                          warm_seconds = run_cargo(profile, backend)
                      except subprocess.CalledProcessError as exc:
                          result["result"] = "failure"
                          result["cache_hit_detail"] = (
                              f"backend={backend};same_job_seed=true;returncode={exc.returncode}"
                          )
                          failures.append(
                              f"{profile['id']}/{mutation['id']}/{competitor['id']} failed with exit code {exc.returncode}"
                          )
                      else:
                          speedup_ratio = cold_seconds / warm_seconds if warm_seconds else float("inf")
                          result["cold_seconds"] = round(cold_seconds, 2)
                          result["warm_seconds"] = round(warm_seconds, 2)
                          result["saved_seconds"] = round(cold_seconds - warm_seconds, 2)
                          result["speedup_ratio"] = round(speedup_ratio, 2)
                          result["cache_hit"] = warm_seconds < cold_seconds
                          result["threshold_failed"] = speedup_ratio < threshold
                          result["cache_dir_bytes"] = measure_cache_size_bytes(backend)
                          if os.environ.get("INCLUDE_RESTORE_PHASE", "").lower() in ("1", "true"):
                              try:
                                  restore_phase = measure_restore_phase(backend, profile, mutation)
                              except Exception as exc:  # noqa: BLE001
                                  print(f"::warning::restore-phase measurement failed for "
                                        f"{profile['id']}/{mutation['id']}/{competitor['id']}: {exc}")
                              else:
                                  result.update(restore_phase)
                          if os.environ.get("INCLUDE_CROSS_PR", "").lower() in ("1", "true"):
                              try:
                                  cross_pr = measure_cross_pr_sharing(profile, backend)
                              except Exception as exc:  # noqa: BLE001
                                  print(f"::warning::cross-pr measurement failed for "
                                        f"{profile['id']}/{mutation['id']}/{competitor['id']}: {exc}")
                              else:
                                  result.update(cross_pr)
                          if result["threshold_failed"]:
                              failures.append(
                                  f"{profile['id']}/{mutation['id']}/{competitor['id']} observed {speedup_ratio:.2f}x, required {threshold:.2f}x"
                              )

                      results.append(result)

          output_path.parent.mkdir(parents=True, exist_ok=True)
          output_path.write_text(
              json.dumps(
                  {
                      "threshold_ratio": threshold,
                      "scenario": scenario,
                      "results": results,
                  },
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )

          if failures:
              print("Benchmark threshold or command failures detected:")
              for failure in failures:
                  print(f"- {failure}")
          PY

      - name: Download native SQLite benchmark artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: native-sqlite-benchmark-*
          path: benchmark-summary/native-sqlite
          merge-multiple: true

      - name: Merge native SQLite benchmark artifacts
        shell: bash
        env:
          BENCHMARK_NATIVE_ARTIFACT_DIR: benchmark-summary/native-sqlite
          BENCHMARK_RESULTS_JSON: benchmark-summary/cache-benchmark-results.json
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          results_path = Path(os.environ["BENCHMARK_RESULTS_JSON"])
          native_dir = Path(os.environ["BENCHMARK_NATIVE_ARTIFACT_DIR"])
          payload = json.loads(results_path.read_text(encoding="utf-8"))

          native_results = []
          for artifact_path in sorted(native_dir.glob("native-sqlite-*.json")):
              artifact = json.loads(artifact_path.read_text(encoding="utf-8"))
              rows = artifact.get("native_sqlite", artifact)
              if isinstance(rows, dict):
                  rows = [rows]
              native_results.extend(rows)

          payload["native_sqlite"] = native_results
          results_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          print(f"Merged {len(native_results)} native SQLite benchmark rows.")
          PY

      - name: Install benchmark report image dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check "pillow==11.3.0"

      - name: Write benchmark summary
        shell: bash
        env:
          BENCHMARK_COMMAND_TARGET: ${{ steps.config.outputs.target }}
          BENCHMARK_CONFIG_PATH: comparison.toml
          BENCHMARK_INPUT_JSON: benchmark-summary/cache-benchmark-results.json
          BENCHMARK_SUMMARY_JSON: benchmark-summary/cache-benchmark-summary.json
          BENCHMARK_SUMMARY_WWW_DIR: benchmark-summary/site
          SCENARIO: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.scenario || 'all' }}
          THRESHOLD_RATIO: ${{ steps.config.outputs.threshold_ratio }}
        run: |
          set -euo pipefail
          python3 .github/scripts/comparison_report.py

      - name: Report configured threshold failures
        shell: bash
        env:
          BENCHMARK_RESULTS_JSON: benchmark-summary/cache-benchmark-results.json
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path(os.environ["BENCHMARK_RESULTS_JSON"]).read_text(encoding="utf-8"))
          failures = []
          for result in payload["results"]:
              slug = f"{result['profile']}/{result['mutation']}/{result['competitor']}"
              if result["result"] != "success":
                  failures.append(f"{slug} failed")
                  continue
              if result["threshold_failed"]:
                  failures.append(f"{slug} missed the configured speedup threshold")

          for failure in failures:
              print(f"::warning::{failure}")
          PY

      - name: Collect zccache daemon logs (rust miss profile)
        if: ${{ always() }}
        shell: bash
        env:
          ZCCACHE_CACHE_DIR: ${{ runner.temp }}/run-benchmark-zccache
        run: |
          set -euo pipefail
          out_dir=benchmark-summary/zccache-daemon-logs
          mkdir -p "$out_dir"
          if [ ! -d "$ZCCACHE_CACHE_DIR" ]; then
            echo "no cache dir at $ZCCACHE_CACHE_DIR — skipping log collection"
            exit 0
          fi
          # Copy *.log files under the cache dir into the artifact directory,
          # preserving the relative path so reviewers can correlate cells
          # with daemon sessions. `find … -type f -name '*.log'` filters out
          # the multi-MB compile_journal.jsonl payloads, which the rust miss
          # profile data does not need.
          (cd "$ZCCACHE_CACHE_DIR" && find . -type f -name '*.log' -print0) \
            | (cd "$ZCCACHE_CACHE_DIR" && tar --null --files-from=- -cf - 2>/dev/null) \
            | (cd "$out_dir" && tar -xf - 2>/dev/null) \
            || echo "no *.log files found under $ZCCACHE_CACHE_DIR"
          # Extract just the rust_miss_profile lines into a single JSONL so
          # next-iteration tooling can aggregate without re-parsing the full
          # daemon log. Each line: a flat {key: value, ...} object keyed on
          # the space-separated key=value format emitted by
          # `emit_rust_miss_profile`. Integer values are parsed as ints.
          jsonl="$out_dir/rust-miss-profile.jsonl"
          extract_script="$(mktemp)"
          trap 'rm -f "$extract_script"' EXIT
          cat >"$extract_script" <<'PY'
          import json
          import sys

          for line in sys.stdin:
              parts = line.strip().split()
              if not parts or parts[0] != "zccache_rust_miss_profile":
                  continue
              row = {}
              for kv in parts[1:]:
                  k, _, v = kv.partition("=")
                  if not k:
                      continue
                  try:
                      row[k] = int(v)
                  except ValueError:
                      row[k] = v
              print(json.dumps(row))
          PY
          : > "$jsonl"
          find "$ZCCACHE_CACHE_DIR" -type f -name '*.log' -print0 \
            | xargs -0 -I{} grep -h '^zccache_rust_miss_profile ' {} \
            | python3 "$extract_script" >> "$jsonl" || true
          echo "rust-miss-profile.jsonl: $(wc -l < "$jsonl") rows"

      - name: Cleanup zccache
        if: ${{ always() }}
        uses: ./.github/actions/comparison-zccache-cleanup

      - name: Upload zccache rust-miss profile artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: comparison-zccache-profile
          path: benchmark-summary/zccache-daemon-logs
          if-no-files-found: warn

      - name: Upload raw benchmark artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cache-benchmark-raw
          path: benchmark-summary/cache-benchmark-results.json
          if-no-files-found: error

      - name: Upload benchmark summary artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cache-benchmark-summary
          path: benchmark-summary/cache-benchmark-summary.json
          if-no-files-found: error

      - name: Upload benchmark www artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cache-benchmark-www
          path: benchmark-summary/site
          if-no-files-found: error

      - name: Configure GitHub Pages
        if: ${{ success() && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload GitHub Pages artifact
        if: ${{ success() && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: benchmark-summary/site

      - name: Publish benchmark stats branch
        if: ${{ success() && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STATS_BRANCH: benchmark-stats
          STATS_DIR: benchmark-summary/site
        run: |
          set -euo pipefail
          publish_dir="$(mktemp -d)"
          trap 'rm -rf "$publish_dir"' EXIT
          cp -a "$STATS_DIR"/. "$publish_dir"/
          git -C "$publish_dir" init
          git -C "$publish_dir" checkout --orphan "$STATS_BRANCH"
          git -C "$publish_dir" config user.name "github-actions[bot]"
          git -C "$publish_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$publish_dir" add -A
          git -C "$publish_dir" commit -m "Update benchmark stats for ${GITHUB_SHA}"
          git -C "$publish_dir" push --force \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${STATS_BRANCH}"

  deploy-pages:
    if: ${{ always() && needs.benchmark.result == 'success' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    name: Deploy benchmark site
    needs:
      - benchmark
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
